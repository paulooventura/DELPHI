name: CosmicClock
options:
  bundleIdPrefix: com.delphi
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

# Local Swift package (shared math + telemetry engine). Lives in this directory.
packages:
  CosmicClock:
    path: .

targets:
  CosmicClockApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CosmicClockApp
    dependencies:
      - package: CosmicClock
        product: CosmicClock
    # XcodeGen generates this Info.plist from the properties below (kept out of the
    # sources folder so it is not bundled as a resource). Regenerated on every run.
    info:
      path: Generated-Info.plist
      properties:
        CFBundleDisplayName: Delphi
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        NSLocationWhenInUseUsageDescription: "Delphi uses your location to place planets, satellites, and aircraft in your local sky."
        NSMotionUsageDescription: "Delphi uses device motion to aim the sky view where you point your phone."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.delphi.cosmicclock
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic

  CosmicClockTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/CosmicClockTests
    dependencies:
      - package: CosmicClock
        product: CosmicClock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.delphi.cosmicclock.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  CosmicClockApp:
    build:
      targets:
        CosmicClockApp: all
        CosmicClockTests: [test]
    run:
      config: Debug
    test:
      targets:
        - CosmicClockTests
