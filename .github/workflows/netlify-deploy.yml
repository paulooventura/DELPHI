name: Deploy to Netlify (palotino.netlify.app)

# NOTE: palotino.netlify.app currently hosts a different site. Primary DELPHI
# deploy is Vercel (delphi.pauloventura.org) via .github/workflows/vercel-deploy.yml

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/10 * * * *'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Check Netlify secrets
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Netlify deploy — secrets not configured. Use Vercel (delphi.pauloventura.org)."
          fi
      - name: Install web deps
        if: steps.netlify.outputs.configured == 'true'
        run: npm --prefix agent/web install
      - name: Deploy to Netlify
        if: steps.netlify.outputs.configured == 'true'
        uses: netlify/actions/cli@master
        with:
          args: deploy --build --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
